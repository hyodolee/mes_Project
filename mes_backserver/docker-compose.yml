# 백엔드 + Chroma를 한 번에 띄운다. (로컬 테스트 + AWS 서버에서 동일하게 사용)
# 비밀값은 같은 폴더의 .env 파일에서 읽는다 (.env는 git에 올리지 않음).
services:
  chroma:
    image: ghcr.io/chroma-core/chroma:1.0.0
    container_name: mes-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/data        # Chroma 1.0.0은 /data에 저장 (영속화)
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: mes-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-mesneo4j1234}
      GRAPH_RAG_NEO4J_PASSWORD: ${NEO4J_PASSWORD:-mesneo4j1234}
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$${GRAPH_RAG_NEO4J_PASSWORD}\" \"RETURN 1\""]
      interval: 10s
      timeout: 15s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  backend:
    build: .                     # 같은 폴더의 Dockerfile로 빌드
    container_name: mes-backend
    ports:
      - "8080:8080"
      - "443:8443"
    depends_on:
      chroma:
        condition: service_started
      neo4j:
        condition: service_healthy
    volumes:
      # live/ 의 인증서는 archive/ 를 가리키는 심볼릭 링크이므로
      # /etc/letsencrypt 전체를 마운트해야 컨테이너 안에서 링크가 풀린다
      - /etc/letsencrypt:/etc/letsencrypt:ro
    environment:
      TZ: Asia/Seoul                      # 컨테이너/JVM 타임존을 한국시간으로 (로그·Java 시간 일관성)
      SPRING_PROFILES_ACTIVE: prod
      SPRING_AI_VECTORSTORE_CHROMA_CLIENT_HOST: http://chroma
      SPRING_AI_VECTORSTORE_CHROMA_CLIENT_PORT: "8000"
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: ${NEO4J_PASSWORD:-mesneo4j1234}
      AI_GRAPH_RAG_ENABLED: ${AI_GRAPH_RAG_ENABLED:-true}
      AI_GRAPH_RAG_SEED_ENABLED: ${AI_GRAPH_RAG_SEED_ENABLED:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-prod}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      MES_DB_PASSWORD: ${MES_DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SECURITY_ALLOWED_ORIGINS: ${SECURITY_ALLOWED_ORIGINS:-http://localhost:3000}
      PLC_SIM_ENABLED: ${PLC_SIM_ENABLED:-false}
      NOTIFICATION_EMAIL_ENABLED: ${NOTIFICATION_EMAIL_ENABLED:-false}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      NOTIFICATION_EMAIL_FROM: ${NOTIFICATION_EMAIL_FROM:-}
      NOTIFICATION_EMAIL_TO: ${NOTIFICATION_EMAIL_TO:-}
      SSL_ENABLED: ${SSL_ENABLED:-false}
      SERVER_PORT: ${SERVER_PORT:-8080}
    restart: unless-stopped

volumes:
  chroma-data:
  neo4j-data:
