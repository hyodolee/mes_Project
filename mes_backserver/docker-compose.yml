# 백엔드 + Chroma를 한 번에 띄운다. (로컬 테스트 + AWS 서버에서 동일하게 사용)
# 비밀값은 같은 폴더의 .env 파일에서 읽는다 (.env는 git에 올리지 않음).
services:
  chroma:
    image: ghcr.io/chroma-core/chroma:1.0.0
    container_name: mes-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/data        # Chroma 1.0.0은 /data에 저장 (영속화)
    restart: unless-stopped

  backend:
    build: .                     # 같은 폴더의 Dockerfile로 빌드
    container_name: mes-backend
    ports:
      - "8080:8080"
    depends_on:
      - chroma
    environment:
      CHROMA_HOST: http://chroma # 같은 compose 안의 chroma 서비스 주소
      CHROMA_PORT: "8000"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      MES_DB_PASSWORD: ${MES_DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SECURITY_ALLOWED_ORIGINS: ${SECURITY_ALLOWED_ORIGINS:-http://localhost:3000}
      PLC_SIM_ENABLED: ${PLC_SIM_ENABLED:-false}
      NOTIFICATION_EMAIL_ENABLED: ${NOTIFICATION_EMAIL_ENABLED:-false}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      NOTIFICATION_EMAIL_FROM: ${NOTIFICATION_EMAIL_FROM:-}
      NOTIFICATION_EMAIL_TO: ${NOTIFICATION_EMAIL_TO:-}
    restart: unless-stopped

volumes:
  chroma-data:
