<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회사 정보 등록/수정</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
    <script th:src="@{/js/layout.js}" src="/js/layout.js" defer></script>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar" th:replace="~{fragments/layout :: sidebar('companies')}"></aside>
    <button type="button" class="sidebar-overlay" data-sidebar-close aria-label="Close menu"></button>

    <main class="app-content">
        <header th:replace="~{fragments/layout :: topbar(${mode == 'create'} ? '회사 등록' : '회사 수정', '회사 정보를 입력하고 저장합니다.')}"></header>

        <section class="card">
            <form th:action="${mode == 'create'} ? @{/master/companies} : @{'/master/companies/' + ${request.companyCd}}" method="post" class="form-grid">
                <div class="field">
                    <label for="companyCd">회사코드</label>
                    <input id="companyCd" type="text" name="companyCd" th:value="${request.companyCd}" th:readonly="${mode == 'edit'}">
                </div>
                <div class="field">
                    <label for="companyNm">회사명</label>
                    <input id="companyNm" type="text" name="companyNm" th:value="${request.companyNm}">
                </div>
                <div class="field">
                    <label for="bizNo">사업자번호</label>
                    <input id="bizNo" type="text" name="bizNo" th:value="${request.bizNo}">
                </div>
                <div class="field">
                    <label for="ceoNm">대표자명</label>
                    <input id="ceoNm" type="text" name="ceoNm" th:value="${request.ceoNm}">
                </div>
                <div class="field field-span-2">
                    <label for="addr">주소</label>
                    <input id="addr" type="text" name="addr" th:value="${request.addr}">
                </div>
                <div class="field">
                    <label for="telNo">전화번호</label>
                    <input id="telNo" type="text" name="telNo" th:value="${request.telNo}">
                </div>
                <div class="field field-use-yn">
                    <label for="useYn">사용여부</label>
                    <select id="useYn" name="useYn">
                        <option value="Y" th:selected="${request.useYn == 'Y' ?: true}">사용 (Y)</option>
                        <option value="N" th:selected="${request.useYn == 'N'}">미사용 (N)</option>
                    </select>
                </div>
                <div class="actions field-span-2">
                    <button class="btn btn-primary" type="submit">저장</button>
                    <a class="btn btn-secondary" href="/master/companies">취소</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
