<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar(active)" class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-brand">
            <svg class="brand-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            <span class="brand-text">MES 관리자</span>
        </div>
        <button type="button" class="sidebar-toggle-btn" data-sidebar-toggle aria-label="메뉴 토글">
            <div class="hamburger-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </button>
    </div>
    <nav class="sidebar-nav">
        <a th:href="@{/}" th:class="'sidebar-link' + (${active} == 'home' ? ' is-active' : '')" title="대시보드">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span class="link-text">대시보드</span>
        </a>
        <a th:href="@{/master/companies}" th:class="'sidebar-link' + (${active} == 'companies' ? ' is-active' : '')" title="회사 정보">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            <span class="link-text">회사 정보</span>
        </a>
        <a th:href="@{/master/plants}" th:class="'sidebar-link' + (${active} == 'plants' ? ' is-active' : '')" title="공장 정보">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 18a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3V2H5v2H2v14h15z"/><path d="M2 8h15"/><path d="M2 14h15"/><path d="M5 2v2"/><path d="M14 2v2"/></svg>
            <span class="link-text">공장 정보</span>
        </a>
        <a th:href="@{/master/items}" th:class="'sidebar-link' + (${active} == 'items' ? ' is-active' : '')" title="품목 정보">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            <span class="link-text">품목 정보</span>
        </a>
        <a th:href="@{/planning/prod-plans}" th:class="'sidebar-link' + (${active} == 'prodPlans' ? ' is-active' : '')" title="생산계획">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h18v18H3z"/><path d="M3 9h18"/><path d="M9 9v12"/></svg>
            <span class="link-text">생산계획</span>
        </a>
        <a th:href="@{/planning/work-orders}" th:class="'sidebar-link' + (${active} == 'workOrders' ? ' is-active' : '')" title="작업지시">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span class="link-text">작업지시</span>
        </a>
        <a th:href="@{/production/work-results}" th:class="'sidebar-link' + (${active} == 'workResults' ? ' is-active' : '')" title="생산실적">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            <span class="link-text">생산실적</span>
        </a>
        <a th:href="@{/quality/inspect-results}" th:class="'sidebar-link' + (${active} == 'inspectResults' ? ' is-active' : '')" title="검사실적">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10.00 10.00 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <span class="link-text">검사실적</span>
        </a>
        <a th:href="@{/inventory/stocks}" th:class="'sidebar-link' + (${active} == 'stocks' ? ' is-active' : '')" title="재고현황">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
            <span class="link-text">재고현황</span>
        </a>
        <a th:href="@{/equipment/oper-statuses}" th:class="'sidebar-link' + (${active} == 'operStatuses' ? ' is-active' : '')" title="설비가동현황">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span class="link-text">설비가동현황</span>
        </a>
        <div class="sidebar-divider"><span>시스템</span></div>
        <a th:href="@{/api/v1/ping}" class="sidebar-link" target="_blank" rel="noopener" title="API 점검">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            <span class="link-text">API 점검</span>
        </a>
        <a th:href="@{/actuator/health}" class="sidebar-link" target="_blank" rel="noopener" title="헬스 체크">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span class="link-text">헬스 체크</span>
        </a>
    </nav>
</aside>

<header th:fragment="topbar(title, subtitle)" class="topbar">
    <div class="topbar-main">
        <div class="topbar-title-row">
            <button type="button" class="mobile-toggle" data-sidebar-toggle aria-label="메뉴 열기">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <h1 class="title" th:text="${title}"></h1>
        </div>
        <p class="subtitle" th:text="${subtitle}"></p>
    </div>
    <div class="sidebar-overlay"></div>
</header>
</body>
</html>
