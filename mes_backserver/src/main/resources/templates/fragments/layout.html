<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar(active)" class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-brand">
            <svg class="brand-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            <span class="brand-text">MES 관리자</span>
        </div>
        <button type="button" class="sidebar-toggle-btn" data-sidebar-toggle aria-label="메뉴 토글">
            <div class="hamburger-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </button>
    </div>
    <nav class="sidebar-nav">
        <a th:href="@{/}" th:class="'sidebar-link' + (${active} == 'home' ? ' is-active' : '')" title="대시보드">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span class="link-text">대시보드</span>
        </a>
        <a th:href="@{/master/companies}" th:class="'sidebar-link' + (${active} == 'companies' ? ' is-active' : '')" title="회사 정보">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            <span class="link-text">회사 정보</span>
        </a>
        <a th:href="@{/master/plants}" th:class="'sidebar-link' + (${active} == 'plants' ? ' is-active' : '')" title="공장 정보">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 18a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3V2H5v2H2v14h15z"/><path d="M2 8h15"/><path d="M2 14h15"/><path d="M5 2v2"/><path d="M14 2v2"/></svg>
            <span class="link-text">공장 정보</span>
        </a>
        <a th:href="@{/planning/prod-plans}" th:class="'sidebar-link' + (${active} == 'prodPlans' ? ' is-active' : '')" title="생산계획">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h18v18H3z"/><path d="M3 9h18"/><path d="M9 9v12"/></svg>
            <span class="link-text">생산계획</span>
        </a>
        <div class="sidebar-divider"><span>시스템</span></div>
        <a th:href="@{/api/v1/ping}" class="sidebar-link" target="_blank" rel="noopener" title="API 점검">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            <span class="link-text">API 점검</span>
        </a>
        <a th:href="@{/actuator/health}" class="sidebar-link" target="_blank" rel="noopener" title="헬스 체크">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span class="link-text">헬스 체크</span>
        </a>
    </nav>
</aside>

<header th:fragment="topbar(title, subtitle)" class="topbar">
    <div class="topbar-main">
        <div class="topbar-title-row">
            <button type="button" class="mobile-toggle" data-sidebar-toggle aria-label="메뉴 열기">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <h1 class="title" th:text="${title}"></h1>
        </div>
        <p class="subtitle" th:text="${subtitle}"></p>
    </div>
    <div class="sidebar-overlay"></div>
</header>
</body>
</html>
