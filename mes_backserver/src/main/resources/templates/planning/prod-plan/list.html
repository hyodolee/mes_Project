<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생산계획 목록</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
    <script th:src="@{/js/layout.js}" src="/js/layout.js" defer></script>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar" th:replace="~{fragments/layout :: sidebar('prodPlans')}"></aside>
    <button type="button" class="sidebar-overlay" data-sidebar-close aria-label="Close menu"></button>

    <main class="app-content">
        <header th:replace="~{fragments/layout :: topbar('생산계획 목록', '생산계획을 조회하고 신규 등록합니다.')}"></header>

        <section class="card">
            <form method="get" action="/planning/prod-plans" class="search-grid">
                <div class="field">
                    <label for="plantCd">공장</label>
                    <select id="plantCd" name="plantCd">
                        <option value="">전체</option>
                        <option th:each="p : ${plants}" th:value="${p.plantCd}" th:text="${p.plantNm}" th:selected="${plantCd == p.plantCd}"></option>
                    </select>
                </div>
                <div class="field">
                    <label for="itemCd">품목코드</label>
                    <input id="itemCd" type="text" name="itemCd" th:value="${itemCd}">
                </div>
                <div class="field">
                    <label for="planStatus">계획상태</label>
                    <input id="planStatus" type="text" name="planStatus" th:value="${planStatus}">
                </div>
                <div class="field">
                    <label for="planFromDt">계획일(시작)</label>
                    <input id="planFromDt" type="date" name="planFromDt" th:value="${planFromDt}">
                </div>
                <div class="field">
                    <label for="planToDt">계획일(종료)</label>
                    <input id="planToDt" type="date" name="planToDt" th:value="${planToDt}">
                </div>
                <div class="actions field-span-2">
                    <button class="btn btn-primary" type="submit">조회</button>
                    <a class="btn btn-secondary" href="/planning/prod-plans/new">생산계획 등록</a>
                </div>
            </form>
            <p class="message" th:if="${message}" th:text="${message}"></p>
        </section>

        <section class="card">
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>계획ID</th>
                        <th>계획번호</th>
                        <th>공장</th>
                        <th>품목</th>
                        <th>계획일자</th>
                        <th>계획수량</th>
                        <th>계획상태</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="plan : ${plans}">
                        <td th:text="${plan.planId}"></td>
                        <td th:text="${plan.planNo}"></td>
                        <td th:text="${plan.plantNm}"></td>
                        <td th:text="|${plan.itemCd} / ${plan.itemNm}|"></td>
                        <td th:text="${plan.planDt}"></td>
                        <td th:text="${plan.planQty}"></td>
                        <td th:text="${plan.planStatus}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(plans)}">
                        <td colspan="7" style="text-align: center; padding: 2rem; color: var(--text-muted);">등록된 생산계획이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- 페이징 -->
            <div class="pagination" th:if="${page.totalPages > 0}">
                <ul class="page-list">
                    <li th:classappend="${page.currentPage == 1} ? 'disabled'">
                        <a th:href="@{/planning/prod-plans(page=1, plantCd=${plantCd}, itemCd=${itemCd}, planStatus=${planStatus}, planFromDt=${planFromDt}, planToDt=${planToDt})}" aria-label="First" title="맨 처음">
                            &laquo;
                        </a>
                    </li>
                    <li th:classappend="${page.currentPage == 1} ? 'disabled'">
                        <a th:href="@{/planning/prod-plans(page=${page.currentPage - 1}, plantCd=${plantCd}, itemCd=${itemCd}, planStatus=${planStatus}, planFromDt=${planFromDt}, planToDt=${planToDt})}" aria-label="Previous" title="이전">
                            &lsaquo;
                        </a>
                    </li>
                    <li th:each="p : ${#numbers.sequence(1, page.totalPages)}"
                        th:classappend="${page.currentPage == p} ? 'active'">
                        <a th:href="@{/planning/prod-plans(page=${p}, plantCd=${plantCd}, itemCd=${itemCd}, planStatus=${planStatus}, planFromDt=${planFromDt}, planToDt=${planToDt})}" th:text="${p}">1</a>
                    </li>
                    <li th:classappend="${page.currentPage == page.totalPages} ? 'disabled'">
                        <a th:href="@{/planning/prod-plans(page=${page.currentPage + 1}, plantCd=${plantCd}, itemCd=${itemCd}, planStatus=${planStatus}, planFromDt=${planFromDt}, planToDt=${planToDt})}" aria-label="Next" title="다음">
                            &rsaquo;
                        </a>
                    </li>
                    <li th:classappend="${page.currentPage == page.totalPages} ? 'disabled'">
                        <a th:href="@{/planning/prod-plans(page=${page.totalPages}, plantCd=${plantCd}, itemCd=${itemCd}, planStatus=${planStatus}, planFromDt=${planFromDt}, planToDt=${planToDt})}" aria-label="Last" title="맨 마지막">
                            &raquo;
                        </a>
                    </li>
                </ul>
            </div>
        </section>
    </main>
</div>
</body>
</html>
