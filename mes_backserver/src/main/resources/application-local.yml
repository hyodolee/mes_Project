spring:
  flyway:
    enabled: true
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: "jdbc:mariadb://mysql-hd-mes.j.aivencloud.com:10483/MES_DB?allowPublicKeyRetrieval=true&useSSL=true&trustServerCertificate=true&sslMode=trust&sessionVariables=time_zone='+09:00'"
    username: avnadmin
    password: ${MES_DB_PASSWORD}

app:
  sentry:
    # Local profile keeps the manual Sentry smoke-test endpoint available
    # even when the app is started from the Spring Boot dashboard instead of launch.json.
    test-endpoint-enabled: ${SENTRY_TEST_ENDPOINT_ENABLED:true}

logging:
  level:
    root: INFO
    com.mes: INFO
    org.springframework.web: INFO
    com.mes.infra.persistence.mybatis.mapper: INFO
    # jdbc.resultsettable: DEBUG
