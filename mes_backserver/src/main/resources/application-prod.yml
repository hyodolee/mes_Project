spring:
  flyway:
    enabled: true
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://mysql-hd-mes.j.aivencloud.com:10483/MES_DB?allowPublicKeyRetrieval=true&useSSL=true&trustServerCertificate=true&sslMode=trust
    username: avnadmin
    password: ${MES_DB_PASSWORD}

server:
  port: ${SERVER_PORT:8080}
  ssl:
    enabled: ${SSL_ENABLED:false}
    certificate: /certs/fullchain.pem
    certificate-private-key: /certs/privkey.pem

logging:
  level:
    root: INFO
    com.mes: INFO

# 메일 서버 미설정/외부 SMTP 지연이 전체 서비스 health를 DOWN(503)으로 만들지 않도록
# mail health indicator 비활성화 (메일 발송 기능 자체는 그대로 동작)
management:
  health:
    mail:
      enabled: false
