spring:
  application:
    name: mes_backserver
  profiles:
    active: local
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
    validate-on-migrate: true

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.mes
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
