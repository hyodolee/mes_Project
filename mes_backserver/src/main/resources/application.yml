spring:
  application:
    name: mes_backserver
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:missing}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
          # gpt-5 family only allows temperature=1 (other values cause API 400)
          temperature: ${OPENAI_TEMPERATURE:1}
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      chroma:
        client:
          host: ${CHROMA_HOST:http://localhost}
          port: ${CHROMA_PORT:8000}
        collection-name: mes-rag-docs
        initialize-schema: true
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  profiles:
    active: local
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
    validate-on-migrate: true

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

ai:
  rag:
    upload-dir: ${AI_RAG_UPLOAD_DIR:../tmp/rag-uploads}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  # PLC event simulator (demo/test only). Set false in production.
  plc-sim:
    enabled: ${PLC_SIM_ENABLED:true}
  notification:
    email:
      # To enable: NOTIFICATION_EMAIL_ENABLED=true + MAIL_* + from/to
      enabled: ${NOTIFICATION_EMAIL_ENABLED:false}
      from: ${NOTIFICATION_EMAIL_FROM:}
      to: ${NOTIFICATION_EMAIL_TO:}            # comma-separated recipients
      # Send mail only at/above this severity (INFO < WARNING < ERROR)
      min-severity: ${NOTIFICATION_EMAIL_MIN_SEVERITY:WARNING}
  security:
    allowed-origins: ${SECURITY_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
    jwt:
      secret: ${JWT_SECRET:mes-mcs-dev-jwt-secret-change-me-please}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:7200}
    # 최초 기동 시 MST_USER에 없는 계정만 생성한다(멱등). 비밀번호는 BCrypt로 저장됨.
    seed-users:
      - username: ${MES_ADMIN_USERNAME:admin}
        password: ${MES_ADMIN_PASSWORD:admin1234}
        display-name: ${MES_ADMIN_DISPLAY_NAME:관리자}
        role: ADMIN
      - username: ${MES_USER_USERNAME:user}
        password: ${MES_USER_PASSWORD:user1234}
        display-name: ${MES_USER_DISPLAY_NAME:일반 사용자}
        role: USER
