spring:
  application:
    name: mes_backserver
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:missing}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
  profiles:
    active: local
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
    validate-on-migrate: true

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.mes
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

mcs:
  api:
    base-url: http://127.0.0.1:8081
