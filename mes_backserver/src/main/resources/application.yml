spring:
  application:
    name: mes_backserver
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:missing}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
          # gpt-5 계열은 temperature=1만 허용 (다른 값이면 API 400 에러로 폴백됨)
          temperature: ${OPENAI_TEMPERATURE:1}
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      chroma:
        client:
          host: http://localhost
          port: 8000
        collection-name: mes-rag-docs
        initialize-schema: true
  profiles:
    active: local
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
    validate-on-migrate: true

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

ai:
  rag:
    upload-dir: ${AI_RAG_UPLOAD_DIR:../tmp/rag-uploads}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  security:
    username: ${MES_AUTH_USERNAME:admin}
    password: ${MES_AUTH_PASSWORD:admin123}
    display-name: ${MES_AUTH_DISPLAY_NAME:MES/MCS Admin}
    role: ${MES_AUTH_ROLE:ADMIN}
    allowed-origins: ${SECURITY_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
    jwt:
      secret: ${JWT_SECRET:mes-mcs-dev-jwt-secret-change-me-please}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:7200}
