<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생산계획 등록1</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
    <script th:src="@{/js/layout.js}" src="/js/layout.js" defer></script>
    <script th:src="@{/js/prod-plan-form.js}" src="/js/prod-plan-form.js" defer></script>
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar" th:replace="~{fragments/layout :: sidebar('prodPlans')}"></aside>
        <button type="button" class="sidebar-overlay" data-sidebar-close aria-label="Close menu"></button>

        <main class="app-content">
            <header th:replace="~{fragments/layout :: topbar('생산계획 등록', '생산계획 정보를 입력하고 저장합니다.')}"></header>

            <section class="card">
                <form action="/planning/prod-plans" method="post" class="form-grid">
                    <!-- 시스템 자동 생성/입력 필드 (화면 숨김) -->
                    <input type="hidden" name="planNo" th:value="${request.planNo}">
                    <input type="hidden" id="customerCd" name="customerCd" th:value="${request.customerCd}">
                    <input type="hidden" id="itemCd" name="itemCd" th:value="${request.itemCd}">
                    <input type="hidden" name="planStatus" value="계획">

                    <div class="field">
                        <label for="plantCd">공장</label>
                        <select id="plantCd" name="plantCd">
                            <option th:each="p : ${plants}" th:value="${p.plantCd}" th:text="${p.plantNm}"
                                th:selected="${request.plantCd == p.plantCd}"></option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="planDt">계획일자</label>
                        <input id="planDt" type="date" name="planDt"
                            th:value="${request.planDt ?: #temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
                    </div>
                    <div class="field">
                        <label for="planType">계획유형</label>
                        <select id="planType" name="planType">
                            <option value="일간계획" th:selected="${request.planType == '일간계획'}">일간계획</option>
                            <option value="주간계획" th:selected="${request.planType == '주간계획'}">주간계획</option>
                            <option value="월간계획" th:selected="${request.planType == '월간계획' ?: true}">월간계획</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="itemSearch">품목검색 (코드/명)</label>
                        <div class="search-input-group">
                            <input id="itemSearch" type="text" th:value="${request.itemCd}"
                                placeholder="품목코드나 명칭을 입력하세요." autocomplete="off">
                            <button type="button" class="btn-icon-search" id="btnItemSearch" title="품목 상세검색">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="11" cy="11" r="8" />
                                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                                </svg>
                            </button>
                            <!-- 실시간 검색 결과 드롭다운 -->
                            <div id="itemDropdown" class="autocomplete-dropdown"></div>
                        </div>
                    </div>
                    <div class="field">
                        <label for="planQty">계획수량</label>
                        <input id="planQty" type="number" step="1" name="planQty" th:value="${request.planQty ?: 0}">
                    </div>
                    <div class="field">
                        <label for="planStartDt">계획시작일</label>
                        <input id="planStartDt" type="date" name="planStartDt"
                            th:value="${request.planStartDt ?: #temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
                    </div>
                    <div class="field">
                        <label for="planEndDt">계획종료일</label>
                        <input id="planEndDt" type="date" name="planEndDt"
                            th:value="${request.planEndDt ?: #temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
                    </div>
                    <div class="field">
                        <label for="priority">우선순위</label>
                        <input id="priority" type="number" name="priority" th:value="${request.priority ?: 1}">
                    </div>
                    <div class="field">
                        <label for="customerNm">고객명</label>
                        <div class="search-input-group">
                            <input id="customerNm" type="text" name="customerNm" th:value="${request.customerNm}"
                                placeholder="고객사를 입력하면 검색됩니다." autocomplete="off">
                            <button type="button" class="btn-icon-search" id="btnCustomerSearch" title="고객 상세검색">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="11" cy="11" r="8" />
                                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                                </svg>
                            </button>
                            <!-- 실시간 검색 결과 드롭다운 -->
                            <div id="customerDropdown" class="autocomplete-dropdown"></div>
                        </div>
                    </div>
                    <div class="field">
                        <label for="orderSearch">수주번호</label>
                        <div class="search-input-group">
                            <input id="orderSearch" type="text" th:value="${request.orderNo}" placeholder="수주번호를 검색하세요."
                                autocomplete="off">
                            <button type="button" class="btn-icon-search" id="btnOrderSearch" title="수주 상세검색">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="11" cy="11" r="8" />
                                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                                </svg>
                            </button>
                            <!-- 실시간 검색 결과 드롭다운 -->
                            <div id="orderDropdown" class="autocomplete-dropdown"></div>
                        </div>
                        <input type="hidden" id="orderNo" name="orderNo" th:value="${request.orderNo}">
                    </div>

                    <!-- 수주 검색 모달 (폼 하단에 추가) -->
                    <div id="orderModal" class="modal">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h3>수주번호 검색</h3>
                                <button type="button" class="modal-close">&times;</button>
                            </div>
                            <div class="modal-body">
                                <div class="modal-search-box">
                                    <input type="text" id="modalOrderSearchInput" placeholder="수주번호나 고객명을 입력하세요...">
                                    <button type="button" class="btn btn-primary" id="btnDoOrderModalSearch">검색</button>
                                </div>
                                <div class="table-wrap">
                                    <table id="orderTable">
                                        <thead>
                                            <tr>
                                                <th>수주번호</th>
                                                <th>고객명</th>
                                                <th>수주일자</th>
                                                <th>납기일자</th>
                                                <th>선택</th>
                                            </tr>
                                        </thead>
                                        <tbody id="orderListBody">
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 고객사 검색 모달 -->
                    <div id="customerModal" class="modal">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h3>고객사 검색</h3>
                                <button type="button" class="modal-close">&times;</button>
                            </div>
                            <div class="modal-body">
                                <div class="modal-search-box">
                                    <input type="text" id="modalSearchInput" placeholder="고객사명을 입력하세요...">
                                    <button type="button" class="btn btn-primary" id="btnDoModalSearch">검색</button>
                                </div>
                                <div class="table-wrap">
                                    <table id="customerTable">
                                        <thead>
                                            <tr>
                                                <th>코드</th>
                                                <th>고객사명</th>
                                                <th>사업자번호</th>
                                                <th>선택</th>
                                            </tr>
                                        </thead>
                                        <tbody id="customerListBody">
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 품목 검색 모달 -->
                    <div id="itemModal" class="modal">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h3>품목 검색</h3>
                                <button type="button" class="modal-close">&times;</button>
                            </div>
                            <div class="modal-body">
                                <div class="modal-search-box">
                                    <input type="text" id="modalItemSearchInput" placeholder="품목명이나 코드를 입력하세요...">
                                    <button type="button" class="btn btn-primary" id="btnDoItemModalSearch">검색</button>
                                </div>
                                <div class="table-wrap">
                                    <table id="itemTable">
                                        <thead>
                                            <tr>
                                                <th>품목코드</th>
                                                <th>품목명</th>
                                                <th>유형</th>
                                                <th>선택</th>
                                            </tr>
                                        </thead>
                                        <tbody id="itemListBody">
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="field">
                        <label for="deliveryDt">납기일</label>
                        <input id="deliveryDt" type="date" name="deliveryDt" th:value="${request.deliveryDt}">
                    </div>
                    <div class="field field-span-2">
                        <label for="planRmk">비고</label>
                        <input id="planRmk" type="text" name="planRmk" th:value="${request.planRmk}">
                    </div>
                    <div class="actions field-span-2">
                        <button class="btn btn-primary" type="submit">저장</button>
                        <a class="btn btn-secondary" href="/planning/prod-plans">취소</a>
                    </div>
                </form>
            </section>
        </main>
    </div>
</body>

</html>
