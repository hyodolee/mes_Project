<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이동 오더 등록/수정</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
    <script th:src="@{/js/layout.js}" src="/js/layout.js" defer></script>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar" th:replace="~{fragments/layout :: sidebar('transfers')}"></aside>
    <button type="button" class="sidebar-overlay" data-sidebar-close aria-label="Close menu"></button>

    <main class="app-content">
        <header th:replace="~{fragments/layout :: topbar(${mode == 'create'} ? '이동 오더 등록' : '이동 오더 수정', '로케이션 간 자재 이동을 등록하고 완료 시 재고를 반영합니다.')}"></header>

        <section class="card">
            <p class="message" th:if="${message}" th:text="${message}" style="color: var(--primary-color); margin-top: 0; font-weight: 600;"></p>
            <p class="error" th:if="${error}" th:text="${error}" style="color: #dc2626; margin-top: 0; font-weight: 600;"></p>

            <h3 style="margin-top: 0;">이동 기본 정보</h3>
            <form th:action="${mode == 'create'} ? @{/transfers} : @{'/transfers/' + ${request.transferId} + '/edit'}" method="post" class="form-grid">
                <div class="field">
                    <label for="plantCd">공장</label>
                    <select id="plantCd" name="plantCd" th:disabled="${mode == 'edit'}" required>
                        <option value="">-- 선택 --</option>
                        <option th:each="p : ${plants}" th:value="${p.plantCd}" th:text="${p.plantNm}" th:selected="${request.plantCd == p.plantCd}"></option>
                    </select>
                    <input type="hidden" name="plantCd" th:value="${request.plantCd}" th:if="${mode == 'edit'}">
                </div>

                <div class="field" th:if="${mode == 'edit'}">
                    <label>이동번호 / 상태</label>
                    <div style="padding: 0.5rem 0;">
                        <strong th:text="${request.transferNo}"></strong>
                        <span class="badge"
                              th:classappend="${request.transferStatus == 'COMPLETED'} ? 'badge-success' : (${request.transferStatus == 'CANCELLED'} ? 'badge-danger' : 'badge-outline')"
                              th:text="${request.transferStatusNm ?: request.transferStatus}"></span>
                    </div>
                </div>

                <div class="field">
                    <label for="fromLocationId">출발 로케이션</label>
                    <select id="fromLocationId" name="fromLocationId" th:disabled="${request.transferStatus != 'REQUESTED' and mode == 'edit'}" required>
                        <option value="">-- 선택 --</option>
                        <option th:each="loc : ${locations}" th:value="${loc.locationId}" th:text="|${loc.warehouseNm} > ${loc.zoneNm} > ${loc.locationCd}|" th:selected="${request.fromLocationId == loc.locationId}"></option>
                    </select>
                </div>

                <div class="field">
                    <label for="toLocationId">도착 로케이션</label>
                    <select id="toLocationId" name="toLocationId" th:disabled="${request.transferStatus != 'REQUESTED' and mode == 'edit'}" required>
                        <option value="">-- 선택 --</option>
                        <option th:each="loc : ${locations}" th:value="${loc.locationId}" th:text="|${loc.warehouseNm} > ${loc.zoneNm} > ${loc.locationCd}|" th:selected="${request.toLocationId == loc.locationId}"></option>
                    </select>
                </div>

                <div class="field field-span-2">
                    <label for="transferReason">이동 사유</label>
                    <input id="transferReason" type="text" name="transferReason" th:value="${request.transferReason}" th:readonly="${request.transferStatus != 'REQUESTED' and mode == 'edit'}">
                </div>

                <div class="actions field-span-2" style="justify-content: flex-start; gap: 0.5rem; margin-top: 1rem;">
                    <th:block th:if="${mode == 'edit'}">
                        <button type="button" class="btn btn-outline" th:if="${request.transferStatus == 'REQUESTED'}" th:onclick="|if(confirm('이동중 상태로 변경하시겠습니까?')) document.getElementById('statusForm_IN_PROGRESS').submit();|">이동 시작</button>
                        <button type="button" class="btn btn-success" th:if="${request.transferStatus == 'IN_PROGRESS' and !#lists.isEmpty(items)}" th:onclick="|if(confirm('이동 완료 처리하시겠습니까? 재고가 반영됩니다.')) document.getElementById('statusForm_COMPLETED').submit();|">이동 완료</button>
                        <span th:if="${request.transferStatus == 'IN_PROGRESS' and #lists.isEmpty(items)}" style="color: #dc2626; font-weight: 600;">이동 품목을 먼저 추가해야 완료할 수 있습니다.</span>
                        <button type="button" class="btn btn-danger" th:if="${request.transferStatus == 'REQUESTED'}" th:onclick="|if(confirm('이 오더를 삭제하시겠습니까?')) document.getElementById('deleteForm').submit();|" style="margin-left: auto;">오더 삭제</button>
                    </th:block>

                    <button class="btn btn-primary" type="submit" th:if="${mode == 'create' or request.transferStatus == 'REQUESTED'}">기본정보 저장</button>
                    <a class="btn btn-secondary" href="/transfers">목록으로</a>
                </div>
            </form>

            <form id="statusForm_IN_PROGRESS" th:if="${mode == 'edit'}" th:action="@{'/transfers/' + ${request.transferId} + '/status'}" method="post" style="display:none;">
                <input type="hidden" name="status" value="IN_PROGRESS">
            </form>
            <form id="statusForm_COMPLETED" th:if="${mode == 'edit'}" th:action="@{'/transfers/' + ${request.transferId} + '/status'}" method="post" style="display:none;">
                <input type="hidden" name="status" value="COMPLETED">
            </form>
            <form id="deleteForm" th:if="${mode == 'edit'}" th:action="@{'/transfers/' + ${request.transferId} + '/delete'}" method="post" style="display:none;"></form>
        </section>

        <section class="card" th:if="${mode == 'edit'}">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3 style="margin: 0;">이동 품목</h3>
            </div>

            <form th:if="${request.transferStatus == 'REQUESTED'}" th:action="@{'/transfers/' + ${request.transferId} + '/items'}" method="post" class="form-grid" style="margin-bottom: 1rem;">
                <div class="field">
                    <label for="itemCd">품목</label>
                    <select id="itemCd" name="itemCd" required>
                        <option value="">-- 선택 --</option>
                        <option th:each="item : ${itemList}" th:value="${item.itemCd}" th:text="|${item.itemCd} - ${item.itemNm}|"></option>
                    </select>
                </div>
                <div class="field">
                    <label for="lotNo">LOT 번호</label>
                    <input id="lotNo" type="text" name="lotNo" placeholder="LOT 없음은 공백">
                </div>
                <div class="field">
                    <label for="transferQty">이동수량</label>
                    <input id="transferQty" type="number" name="transferQty" min="0.001" step="0.001" required>
                </div>
                <div class="actions" style="align-items: end;">
                    <button class="btn btn-primary" type="submit">품목 추가</button>
                </div>
            </form>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>품목코드</th>
                        <th>품목명</th>
                        <th>LOT번호</th>
                        <th style="text-align:right;">이동수량</th>
                        <th>상태</th>
                        <th th:if="${request.transferStatus == 'REQUESTED'}">관리</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${items}">
                        <td th:text="${item.itemCd}"></td>
                        <td th:text="${item.itemNm}"></td>
                        <td th:text="${item.lotNo == null or item.lotNo == '' ? '-' : item.lotNo}"></td>
                        <td style="text-align:right; font-weight:bold;" th:text="${item.transferQty}"></td>
                        <td><span class="badge badge-outline" th:text="${item.itemStatusNm ?: item.itemStatus}"></span></td>
                        <td th:if="${request.transferStatus == 'REQUESTED'}">
                            <form th:action="@{'/transfers/' + ${request.transferId} + '/items/' + ${item.transferItemId} + '/delete'}" method="post">
                                <button class="btn btn-sm btn-danger" type="submit" onclick="return confirm('이 품목을 삭제하시겠습니까?')">삭제</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(items)}">
                        <td th:colspan="${request.transferStatus == 'REQUESTED'} ? 6 : 5" style="text-align: center; padding: 2rem; color: var(--text-muted);">등록된 품목이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="card" th:if="${mode == 'edit'}">
            <h3 style="margin-top: 0;">이동 처리 이력</h3>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>처리시각</th>
                        <th>유형</th>
                        <th>로케이션</th>
                        <th>품목</th>
                        <th>LOT</th>
                        <th style="text-align:right;">수량</th>
                        <th style="text-align:right;">변경전</th>
                        <th style="text-align:right;">변경후</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="history : ${transferHistories}">
                        <td th:text="${#temporals.format(history.regDtm, 'yyyy-MM-dd HH:mm:ss')}"></td>
                        <td>
                            <span class="badge" th:classappend="${history.transType == 'TF_IN'} ? 'badge-success' : 'badge-outline'" th:text="${history.transTypeNm ?: history.transType}"></span>
                        </td>
                        <td th:text="${history.locationCd}"></td>
                        <td th:text="|${history.itemCd} - ${history.itemNm}|"></td>
                        <td th:text="${history.lotNo == null or history.lotNo == '' ? '-' : history.lotNo}"></td>
                        <td style="text-align:right; font-weight:bold;" th:text="${history.transQty}"></td>
                        <td style="text-align:right;" th:text="${history.beforeQty}"></td>
                        <td style="text-align:right;" th:text="${history.afterQty}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(transferHistories)}">
                        <td colspan="8" style="text-align: center; padding: 2rem; color: var(--text-muted);">아직 이동 처리 이력이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
