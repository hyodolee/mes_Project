<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar(active)" class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-brand">
            <svg class="brand-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
            <span class="brand-text">MCS 관리자</span>
        </div>
        <button type="button" class="sidebar-toggle-btn" data-sidebar-toggle aria-label="메뉴 토글">
            <div class="hamburger-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </button>
    </div>
    <nav class="sidebar-nav">
        <a th:href="@{/}" th:class="'sidebar-link' + (${active} == 'home' ? ' is-active' : '')" title="대시보드">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span class="link-text">대시보드</span>
        </a>

        <div class="sidebar-divider"><span>창고 관리</span></div>
        <a th:href="@{/zones}" th:class="'sidebar-link' + (${active} == 'zones' ? ' is-active' : '')" title="구역 관리">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            <span class="link-text">구역 관리</span>
        </a>
        <a th:href="@{/locations}" th:class="'sidebar-link' + (${active} == 'locations' ? ' is-active' : '')" title="로케이션 관리">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span class="link-text">로케이션 관리</span>
        </a>

        <div class="sidebar-divider"><span>입출고</span></div>
        <a th:href="@{/inbounds}" th:class="'sidebar-link' + (${active} == 'inbounds' ? ' is-active' : '')" title="입고 관리">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
            <span class="link-text">입고 관리</span>
        </a>
        <a th:href="@{/outbounds}" th:class="'sidebar-link' + (${active} == 'outbounds' ? ' is-active' : '')" title="출고 관리">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 8 12 12 16 8"/><line x1="12" y1="12" x2="12" y2="3"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
            <span class="link-text">출고 관리</span>
        </a>
        <a th:href="@{/transfers}" th:class="'sidebar-link' + (${active} == 'transfers' ? ' is-active' : '')" title="이동 관리">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
            <span class="link-text">이동 관리</span>
        </a>

        <div class="sidebar-divider"><span>재고</span></div>
        <a th:href="@{/inventory/stock}" th:class="'sidebar-link' + (${active} == 'stock' ? ' is-active' : '')" title="로케이션 재고">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
            <span class="link-text">로케이션 재고</span>
        </a>
        <a th:href="@{/inventory/transactions}" th:class="'sidebar-link' + (${active} == 'transactions' ? ' is-active' : '')" title="재고 이력">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span class="link-text">재고 이력</span>
        </a>
    </nav>
</aside>

<header th:fragment="topbar(title, subtitle)" class="topbar">
    <div class="topbar-main">
        <div class="topbar-title-row">
            <button type="button" class="mobile-toggle" data-sidebar-toggle aria-label="메뉴 열기">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <h1 class="title" th:text="${title}"></h1>
        </div>
        <p class="subtitle" th:text="${subtitle}"></p>
    </div>
    <div class="sidebar-overlay"></div>
</header>
</body>
</html>
