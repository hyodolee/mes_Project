<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로케이션 정보 등록/수정</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
    <script th:src="@{/js/layout.js}" src="/js/layout.js" defer></script>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar" th:replace="~{fragments/layout :: sidebar('locations')}"></aside>
    <button type="button" class="sidebar-overlay" data-sidebar-close aria-label="Close menu"></button>

    <main class="app-content">
        <header th:replace="~{fragments/layout :: topbar(${mode == 'create'} ? '로케이션 등록' : '로케이션 수정', '로케이션 정보를 입력하고 저장합니다.')}"></header>

        <section class="card">
            <form th:action="${mode == 'create'} ? @{/locations} : @{'/locations/' + ${request.locationId} + '/edit'}" method="post" class="form-grid">
                <div class="field">
                    <label for="zoneId">구역</label>
                    <select id="zoneId" name="zoneId" th:disabled="${mode == 'edit'}" required>
                        <option th:each="z : ${zones}" th:value="${z.zoneId}" th:text="|${z.warehouseNm} - ${z.zoneNm}|" th:selected="${request.zoneId == z.zoneId}"></option>
                    </select>
                    <!-- disabled 시 폼 제출 안 되므로 hidden 추가 -->
                    <input type="hidden" name="zoneId" th:value="${request.zoneId}" th:if="${mode == 'edit'}">
                </div>
                <div class="field">
                    <label for="locationCd">로케이션코드</label>
                    <input id="locationCd" type="text" name="locationCd" th:value="${request.locationCd}" th:readonly="${mode == 'edit'}" placeholder="예: A-01-01" required>
                </div>
                <div class="field">
                    <label for="locationNm">로케이션명</label>
                    <input id="locationNm" type="text" name="locationNm" th:value="${request.locationNm}" required>
                </div>
                <div class="field">
                    <label for="maxCapacity">최대수용량</label>
                    <input id="maxCapacity" type="number" name="maxCapacity" th:value="${request.maxCapacity ?: 0.0}" step="0.001">
                </div>
                <div class="field">
                    <label for="locationStatus">상태</label>
                    <select id="locationStatus" name="locationStatus">
                        <option th:each="s : ${locStatuses}" th:value="${s.comCd}" th:text="${s.comNm}" th:selected="${request.locationStatus == s.comCd}"></option>
                    </select>
                </div>
                <div class="field field-use-yn">
                    <label for="useYn">사용여부</label>
                    <select id="useYn" name="useYn">
                        <option value="Y" th:selected="${request.useYn == 'Y' ?: true}">사용 (Y)</option>
                        <option value="N" th:selected="${request.useYn == 'N'}">미사용 (N)</option>
                    </select>
                </div>
                <div class="actions field-span-2" style="justify-content: flex-start; gap: 0.5rem;">
                    <button type="button" class="btn btn-danger" th:if="${mode == 'edit'}" th:onclick="|if(confirm('정말 삭제하시겠습니까?')) document.getElementById('deleteForm').submit();|">삭제</button>
                    <button class="btn btn-primary" type="submit">저장</button>
                    <a class="btn btn-secondary" href="/locations">취소</a>
                </div>
            </form>
            <!-- 삭제용 숨김 폼 -->
            <form id="deleteForm" th:if="${mode == 'edit'}" th:action="@{'/locations/' + ${request.locationId} + '/delete'}" method="post" style="display:none;"></form>
        </section>
    </main>
</div>
</body>
</html>
